<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JavaScript Mindmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f8f7;--border:#e3e2db;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#9a9890;
  --font:'Inter',system-ui,sans-serif;
  --radius:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181817;--bg2:#222220;--border:#333330;
  --text:#f0ede4;--text2:#b4b2a9;--text3:#6b6965;
}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* ── Header ── */
.hdr{padding:20px 24px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.htitle{font-size:19px;font-weight:600}
.hbadge{font-size:11px;background:#F7DF1E;color:#1a1200;padding:2px 8px;border-radius:99px;font-weight:700;vertical-align:middle;margin-left:6px}
.hprog{flex:1;min-width:140px;display:flex;align-items:center;gap:8px}
.htrack{flex:1;height:5px;background:var(--border);border-radius:9px;overflow:hidden}
.hfill{height:100%;background:linear-gradient(90deg,#534AB7 0%,#5DCAA5 100%);border-radius:9px;transition:width .4s ease;width:0%}
.hlabel{font-size:11px;color:var(--text3);white-space:nowrap}
.hbtn{font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s}
.hbtn:hover{background:var(--bg2);color:var(--text)}

/* ── Search ── */
.sw{padding:12px 24px 0}
.sb{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:0 12px;max-width:460px;transition:border-color .15s}
.sb:focus-within{border-color:#534AB7}
.si{color:var(--text3);font-size:14px;flex-shrink:0}
.si2{flex:1;border:none;background:transparent;padding:9px 0;font-size:13px;color:var(--text);font-family:var(--font);outline:none}
.si2::placeholder{color:var(--text3)}
.scl{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;display:none}
.scl:hover{color:var(--text)}
.sres{font-size:11px;color:var(--text3);padding:5px 24px 0}

/* ── Legend ── */
.leg{padding:10px 24px 0;display:flex;flex-wrap:wrap;gap:6px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);cursor:pointer;padding:3px 8px;border-radius:5px;transition:background .1s;user-select:none}
.li:hover,.li.act{background:var(--bg2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── SVG ── */
.mw{padding:8px 24px 0}
#mm{display:block;width:100%;max-width:700px;margin:0 auto;overflow:visible}
.cat-nd{cursor:pointer}
.cat-nd rect{transition:all .2s}
.cat-nd:hover rect{filter:brightness(1.07)}

/* ── Detail Panel ── */
#dtl{border-top:1px solid var(--border);margin-top:4px;padding:0 24px}
.dhdr{padding:14px 0 8px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.dname{font-size:16px;font-weight:500}
.dmeta{font-size:12px;color:var(--text3)}
.dbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dtrack{flex:1;height:4px;background:var(--border);border-radius:9px;overflow:hidden}
.dfill{height:100%;border-radius:9px;transition:width .3s}
.dlabel{font-size:11px;color:var(--text3);white-space:nowrap}
.dmrk{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s}
.dmrk:hover{background:var(--bg2);color:var(--text)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-bottom:16px}
.ccard{border-radius:10px;padding:11px 13px}
.chdr{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.cico{font-size:14px;line-height:1}
.ctitle{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;flex:1}
.cmrk{font-size:10px;padding:2px 7px;border-radius:4px;border:none;cursor:pointer;opacity:.65;transition:opacity .12s;font-family:var(--font)}
.cmrk:hover{opacity:1}
.ci{font-size:12px;padding:2.5px 0;border-bottom-width:1px;border-bottom-style:solid;display:flex;align-items:flex-start;gap:5px;cursor:pointer;transition:opacity .1s;line-height:1.45}
.ci:last-child{border-bottom:none !important}
.ci:hover{opacity:.7}
.ci input[type=checkbox]{margin-top:3px;flex-shrink:0;cursor:pointer;accent-color:currentColor;width:11px;height:11px}
.ci.done .ct{text-decoration:line-through;opacity:.5}
.hi{background:#fde047;color:#161200;border-radius:2px;padding:0 1px}
@media(prefers-color-scheme:dark){.hi{background:#854d00;color:#fde047}}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ccard{animation:fadeUp .18s ease both}
.ccard:nth-child(2){animation-delay:.03s}
.ccard:nth-child(3){animation-delay:.06s}
.ccard:nth-child(4){animation-delay:.09s}
.ccard:nth-child(5){animation-delay:.12s}
.ccard:nth-child(n+6){animation-delay:.15s}

/* ── Hint ── */
.hint{text-align:center;font-size:12px;color:var(--text3);padding:5px 0 14px}
kbd{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px;font-family:var(--font)}
</style>
</head>
<body>

<div class="hdr">
  <div class="htitle">JavaScript<span class="hbadge">ES2024</span></div>
  <div class="hprog">
    <div class="htrack"><div class="hfill" id="hf"></div></div>
    <span class="hlabel" id="hl">0 / 0</span>
  </div>
  <button class="hbtn" onclick="exportProg()">↓ Export</button>
  <button class="hbtn" onclick="resetProg()">↺ Reset</button>
</div>

<div class="sw">
  <div class="sb">
    <span class="si">🔍</span>
    <input class="si2" id="sq" type="text" placeholder="Search any concept… (e.g. closure, await, proxy)" oninput="onSearch(this.value)">
    <span class="scl" id="scl" onclick="clearSearch()">✕ clear</span>
  </div>
</div>
<div class="sres" id="sres"></div>

<div class="leg" id="leg"></div>

<div class="mw">
  <svg id="mm" viewBox="0 0 680 520">
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="mml"></g>
    <g id="mmn"></g>
  </svg>
</div>

<div id="dtl">
  <p class="hint">Click any node to explore its concepts &nbsp;·&nbsp; <kbd>1</kbd>–<kbd>9</kbd> select category &nbsp;·&nbsp; <kbd>Esc</kbd> close</p>
</div>

<script>
// ── Palette ──────────────────────────────────────────────────────────────────
const dk = matchMedia('(prefers-color-scheme:dark)').matches;
const pal = {
  purple:dk?{f:'#3C3489',s:'#AFA9EC',t:'#CECBF6',b:'#AFA9EC22'}:{f:'#EEEDFE',s:'#534AB7',t:'#3C3489',b:'#534AB722'},
  teal:  dk?{f:'#085041',s:'#5DCAA5',t:'#9FE1CB',b:'#5DCAA522'}:{f:'#E1F5EE',s:'#0F6E56',t:'#085041',b:'#0F6E5622'},
  amber: dk?{f:'#633806',s:'#EF9F27',t:'#FAC775',b:'#EF9F2722'}:{f:'#FAEEDA',s:'#854F0B',t:'#633806',b:'#854F0B22'},
  coral: dk?{f:'#712B13',s:'#F0997B',t:'#F5C4B3',b:'#F0997B22'}:{f:'#FAECE7',s:'#993C1D',t:'#712B13',b:'#993C1D22'},
  blue:  dk?{f:'#0C447C',s:'#85B7EB',t:'#B5D4F4',b:'#85B7EB22'}:{f:'#E6F1FB',s:'#185FA5',t:'#0C447C',b:'#185FA522'},
  green: dk?{f:'#27500A',s:'#97C459',t:'#C0DD97',b:'#97C45922'}:{f:'#EAF3DE',s:'#3B6D11',t:'#27500A',b:'#3B6D1122'},
  pink:  dk?{f:'#72243E',s:'#ED93B1',t:'#F4C0D1',b:'#ED93B122'}:{f:'#FBEAF0',s:'#993556',t:'#72243E',b:'#99355622'},
  red:   dk?{f:'#791F1F',s:'#F09595',t:'#F7C1C1',b:'#F0959522'}:{f:'#FCEBEB',s:'#A32D2D',t:'#791F1F',b:'#A32D2D22'},
  gray:  dk?{f:'#444441',s:'#B4B2A9',t:'#D3D1C7',b:'#B4B2A922'}:{f:'#F1EFE8',s:'#5F5E5A',t:'#444441',b:'#5F5E5A22'},
};

// ── Data ─────────────────────────────────────────────────────────────────────
const cats=[
  {id:'core',name:'Core Language',p:'purple',angle:-90,groups:[
    {n:'Variables',icon:'📦',cs:['var — function-scoped, hoisted','let — block-scoped, no hoist','const — block-scoped, immutable binding','Temporal Dead Zone (TDZ)','Hoisting behavior of declarations','Variable shadowing','Lexical environment & scope chain','Global vs local scope']},
    {n:'Data Types',icon:'🔤',cs:['string — UTF-16 encoded','number — IEEE 754 double precision','boolean — true / false','null — intentional absence','undefined — uninitialized','symbol — unique, immutable key','BigInt — arbitrary precision integer','object — key-value container','typeof operator','instanceof operator','Primitive vs Reference semantics','Type coercion (implicit)','Truthy / Falsy values table','NaN, Infinity, -Infinity']},
    {n:'Operators',icon:'➗',cs:['Arithmetic: +, -, *, /, %, **','Comparison: === (strict) vs == (loose)','Logical: &&, ||, ! (short-circuit)','Bitwise: &, |, ^, ~, <<, >>, >>>','Ternary: condition ? a : b','Optional chaining: ?.','Nullish coalescing: ??','Logical assignment: &&=, ||=, ??=','Comma operator','void operator','in operator (property check)','delete operator']},
    {n:'Control Flow',icon:'🔀',cs:['if / else if / else','switch / case / default / fallthrough','for (init; cond; update)','while (condition)','do...while (runs at least once)','for...of — iterates values','for...in — iterates own+inherited keys','break with labels','continue (skip iteration)','Labeled statements','throw expression']},

    {n:'this Keyword',icon:'👉',cs:['Global context (window / globalThis)','Implicit method binding','Constructor binding (new keyword)','call(thisArg, ...args)','apply(thisArg, [args])','bind(thisArg) — returns new fn','Arrow fn: lexical this (inherited)','Losing this context','Class method binding patterns','this in event listeners']},

    {n:'Symbols',icon:'🔑',cs:['Symbol() — always unique','Symbol.for(key) — global registry','Symbol.keyFor(sym) — reverse lookup','Well-known: Symbol.iterator','Well-known: Symbol.toPrimitive','Well-known: Symbol.hasInstance','Well-known: Symbol.toStringTag','Well-known: Symbol.asyncIterator','Symbols as object keys','Symbols not enumerable by default','Symbol.species for subclassing']},

  {id:'ds',name:'Collections',p:'blue',angle:70,groups:[
    {n:'Array Methods',icon:'📋',cs:['map(fn) — transform elements','filter(fn) — select elements','reduce(fn, init) — fold to single value','reduceRight — right-to-left reduce','forEach(fn) — side effects only','find(fn) — first match or undefined','findIndex(fn) — first match index','findLast(fn) / findLastIndex(fn)','some(fn) — any match?','every(fn) — all match?','includes(val) — contains value?','flat(depth) — flatten nested arrays','flatMap(fn) — map then flatten 1 level','sort(compareFn) — sorts in place (stable)','slice(start, end) — non-mutating copy','splice(start, del, ...items) — mutating','at(index) — supports negative indexes','Array.from(iterable, mapFn)','Array.of(...items)','fill(val, start, end)','copyWithin(target, start, end)','indexOf / lastIndexOf','join(separator)','keys() / values() / entries()','toReversed() / toSorted() / toSpliced()']},

// ── State ────────────────────────────────────────────────────────────────────
const CX=340,CY=265,RAD=188,NW=120,NH=36;
let active=null, query='';
const STORE='jsmm_prog_v1';
let prog={};
try{prog=JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){}

function save(){localStorage.setItem(STORE,JSON.stringify(prog))}
function key(cid,gi,ci){return `${cid}:${gi}:${ci}`}
function isDone(cid,gi,ci){return !!prog[key(cid,gi,ci)]}
function toggle(cid,gi,ci){const k=key(cid,gi,ci);prog[k]=!prog[k];if(!prog[k])delete prog[k];save();updateOverall();if(active===cid)updateCatBar()}

// ── Overall Progress ──────────────────────────────────────────────────────────
function totalConcepts(){return cats.reduce((a,c)=>a+c.groups.reduce((b,g)=>b+g.cs.length,0),0)}
function learnedCount(){return Object.values(prog).filter(Boolean).length}
function updateOverall(){
  const tot=totalConcepts(),lrn=learnedCount();
  const pct=tot?Math.round(lrn/tot*100):0;
  document.getElementById('hf').style.width=pct+'%';
  document.getElementById('hl').textContent=lrn+' / '+tot+' ('+pct+'%)';
}

function updateCatBar(){
  if(!active)return;
  const cat=cats.find(c=>c.id===active);if(!cat)return;
  const total=cat.groups.reduce((a,g)=>a+g.cs.length,0);
  const learned=cat.groups.reduce((a,g,gi)=>a+g.cs.filter((_,ci)=>isDone(cat.id,gi,ci)).length,0);
  const pct=total?Math.round(learned/total*100):0;
  const el=document.getElementById('dfill');const lb=document.getElementById('dlabel');
  if(el)el.style.width=pct+'%';
  if(lb)lb.textContent=learned+' / '+total+' learned';
}

// ── Bézier path helper ────────────────────────────────────────────────────────
function rad(d){return d*Math.PI/180}
function bezier(x1,y1,x2,y2){
  const mx=(x1+x2)/2,my=(y1+y2)/2;
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const cx1=x1+(mx-x1)*.6,cy1=y1+(my-y1)*.6;
  const cx2=x2-(x2-mx)*.6,cy2=y2-(y2-my)*.6;
  return`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
}

// ── Draw SVG ──────────────────────────────────────────────────────────────────
function draw(){
  const lG=document.getElementById('mml'),nG=document.getElementById('mmn');
  let l='',n='';
  cats.forEach(c=>{
    const x=CX+RAD*Math.cos(rad(c.angle)),y=CY+RAD*Math.sin(rad(c.angle));
    const P=pal[c.p],act=active===c.id;
    const tot=c.groups.reduce((a,g)=>a+g.cs.length,0);
    const lrn=c.groups.reduce((a,g,gi)=>a+g.cs.filter((_,ci)=>isDone(c.id,gi,ci)).length,0);
    const pct=tot?lrn/tot:0;
    // connector line
    l+=`<path d="${bezier(CX,CY,x,y)}" fill="none" stroke="${P.s}" stroke-width="${act?2:0.8}" opacity="${act?0.75:0.28}" stroke-dasharray="${act?'none':'4,3'}"/>`;
    // node
    const filter=act?'filter="url(#glow)"':'';
    n+=`<g class="cat-nd" onclick="selCat('${c.id}')">
      <rect x="${x-NW/2}" y="${y-NH/2}" width="${NW}" height="${NH}" rx="${NH/2}" fill="${P.f}" stroke="${P.s}" stroke-width="${act?2.5:1.5}" ${filter}/>`;
    // mini progress arc
    if(pct>0){
      const r=NH/2+3,startA=rad(-90),endA=startA+2*Math.PI*pct;
      const laf=pct>.5?1:0;
      const sx=x+r*Math.cos(startA),sy=y+r*Math.sin(startA);
      const ex=x+r*Math.cos(endA),ey=y+r*Math.sin(endA);
      l+=`<path d="M${sx},${sy} A${r},${r} 0 ${laf} 1 ${ex},${ey}" fill="none" stroke="${P.s}" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>`;
    }
    n+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="${P.t}" font-size="11.5" font-weight="500" font-family="Inter,sans-serif">${c.name}</text>
    </g>`;
  });
  // center node
  const cf=dk?'#CECBF6':'#2C2C2A',ct=dk?'#1a1a18':'#ffffff';
  n+=`<g><rect x="${CX-60}" y="${CY-20}" width="120" height="40" rx="20" fill="${cf}"/>
    <text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="central" fill="${ct}" font-size="14" font-weight="600" font-family="Inter,sans-serif">JavaScript</text></g>`;
  lG.innerHTML=l;nG.innerHTML=n;
}

// ── Legend ────────────────────────────────────────────────────────────────────
function buildLegend(){
  const el=document.getElementById('leg');
  el.innerHTML=cats.map(c=>{
    const P=pal[c.p];
    return`<span class="li" onclick="selCat('${c.id}')" title="${c.name}">
      <span class="ld" style="background:${P.s}"></span>${c.name}</span>`;
  }).join('');
}

// ── Select Category ───────────────────────────────────────────────────────────
function selCat(id){
  active=active===id?null:id;
  draw();renderDtl();
  // highlight legend
  document.querySelectorAll('.li').forEach((el,i)=>{el.classList.toggle('act',cats[i]?.id===active)});
}

// ── Render Detail ─────────────────────────────────────────────────────────────
function hl(text,q){
  if(!q)return text;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<span class="hi">$1</span>');
}

function renderDtl(){
  const el=document.getElementById('dtl');
  if(!active){
    el.innerHTML='<p class="hint">Click any node to explore its concepts &nbsp;·&nbsp; <kbd>1</kbd>–<kbd>9</kbd> select category &nbsp;·&nbsp; <kbd>Esc</kbd> close</p>';
    return;
  }
  const cat=cats.find(c=>c.id===active);
  const P=pal[cat.p];
  const total=cat.groups.reduce((a,g)=>a+g.cs.length,0);
  const q=query;

  let h=`<div class="dhdr">
    <span class="dname">${cat.name}</span>
    <span class="dmeta">${cat.groups.length} groups · ${total} concepts</span>
  </div>
  <div class="dbar">
    <div class="dtrack"><div class="dfill" id="dfill" style="background:${P.s};width:0%"></div></div>
    <span class="dlabel" id="dlabel"></span>
    <button class="dmrk" onclick="markAllCat(${cats.indexOf(cat)},true)">Mark all ✓</button>
    <button class="dmrk" onclick="markAllCat(${cats.indexOf(cat)},false)">Clear all</button>
  </div>
  <div class="cgrid">`;

  cat.groups.forEach((g,gi)=>{
    const gTotal=g.cs.length;
    const gLearned=g.cs.filter((_,ci)=>isDone(cat.id,gi,ci)).length;
    const allDone=gLearned===gTotal;
    const filtered=q?g.cs.filter(c=>c.toLowerCase().includes(q.toLowerCase())):g.cs;
    if(q&&!filtered.length)return;
    h+=`<div class="ccard" style="background:${P.b};border:1px solid ${P.s}33">
      <div class="chdr">
        <span class="cico">${g.icon||'📌'}</span>
        <span class="ctitle" style="color:${P.t}">${g.n}</span>
        <button class="cmrk" style="background:${P.f};color:${P.t}" onclick="markGroup(${cats.indexOf(cat)},${gi},${allDone?'false':'true'})">${allDone?'↩':'✓'}</button>
      </div>`;
    filtered.forEach(c=>{
      const ci=g.cs.indexOf(c);
      const done=isDone(cat.id,gi,ci);
      h+=`<div class="ci${done?' done':''}" onclick="toggle('${cat.id}',${gi},${ci});this.classList.toggle('done')">
        <input type="checkbox" ${done?'checked':''} onclick="event.stopPropagation();toggle('${cat.id}',${gi},${ci});this.closest('.ci').classList.toggle('done')">
        <span class="ct" style="color:${P.t}">${hl(c,q)}</span>
      </div>`;
    });
    h+=`</div>`;
  });

  h+=`</div>`;
  el.innerHTML=h;
  updateCatBar();
}

// ── Mark helpers ──────────────────────────────────────────────────────────────
function markGroup(cIdx,gi,val){
  const cat=cats[cIdx];
  cat.groups[gi].cs.forEach((_,ci)=>{if(val)prog[key(cat.id,gi,ci)]=true;else delete prog[key(cat.id,gi,ci)];});
  save();updateOverall();renderDtl();draw();
}
function markAllCat(cIdx,val){
  const cat=cats[cIdx];
  cat.groups.forEach((g,gi)=>g.cs.forEach((_,ci)=>{if(val)prog[key(cat.id,gi,ci)]=true;else delete prog[key(cat.id,gi,ci)];}));
  save();updateOverall();renderDtl();draw();
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch(v){
  query=v.trim();
  document.getElementById('scl').style.display=query?'inline':'none';
  if(query){
    // show search results across all cats
    let total=0;
    cats.forEach(c=>c.groups.forEach(g=>g.cs.forEach(t=>{if(t.toLowerCase().includes(query.toLowerCase()))total++;})));
    document.getElementById('sres').textContent=total?`${total} concept${total!==1?'s':''} match`:'No matches';
    renderSearchResults();
  } else {
    document.getElementById('sres').textContent='';
    if(active)renderDtl();else document.getElementById('dtl').innerHTML='<p class="hint">Click any node to explore its concepts &nbsp;·&nbsp; <kbd>1</kbd>–<kbd>9</kbd> select category &nbsp;·&nbsp; <kbd>Esc</kbd> close</p>';
  }
}

function renderSearchResults(){
  const el=document.getElementById('dtl');
  const q=query;
  let h='<div class="cgrid" style="margin-top:12px">';
  cats.forEach(cat=>{
    const P=pal[cat.p];
    cat.groups.forEach((g,gi)=>{
      const hits=g.cs.filter(c=>c.toLowerCase().includes(q.toLowerCase()));
      if(!hits.length)return;
      h+=`<div class="ccard" style="background:${P.b};border:1px solid ${P.s}33">
        <div class="chdr"><span class="cico">${g.icon||'📌'}</span>
        <span class="ctitle" style="color:${P.t}">${cat.name} · ${g.n}</span></div>`;
      hits.forEach(c=>{
        const ci=g.cs.indexOf(c);const done=isDone(cat.id,gi,ci);
        h+=`<div class="ci${done?' done':''}" onclick="toggle('${cat.id}',${gi},${ci});this.classList.toggle('done')">
          <input type="checkbox" ${done?'checked':''} onclick="event.stopPropagation();toggle('${cat.id}',${gi},${ci});this.closest('.ci').classList.toggle('done')">
          <span class="ct" style="color:${P.t}">${hl(c,q)}</span>
        </div>`;
      });
      h+='</div>';
    });
  });
  h+='</div>';
  el.innerHTML=h;
}

function clearSearch(){
  document.getElementById('sq').value='';onSearch('');
}

// ── Export / Reset ────────────────────────────────────────────────────────────
function exportProg(){
  const data={exported:new Date().toISOString(),learnedCount:learnedCount(),totalCount:totalConcepts(),progress:prog};
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(data,null,2));
  a.download='js_mindmap_progress.json';a.click();
}
function resetProg(){
  if(!confirm('Reset all progress?'))return;
  prog={};save();updateOverall();if(active)renderDtl();draw();
}

// ── Keyboard nav ──────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Escape'){active=null;draw();renderDtl();return;}
  const n=parseInt(e.key);
  if(n>=1&&n<=cats.length){selCat(cats[n-1].id);}
});

// ── Boot ──────────────────────────────────────────────────────────────────────
buildLegend();draw();updateOverall();
</script>
