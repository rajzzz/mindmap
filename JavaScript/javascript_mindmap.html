const CX=340,CY=270,RAD=195,NW=118,NH=36;
let active=null;

function rad(d){return d*Math.PI/180}

function draw(){
  const lG=document.getElementById('mml');
  const nG=document.getElementById('mmn');
  let l='',n='';

  cats.forEach(c=>{
    const x=CX+RAD*Math.cos(rad(c.angle));
    const y=CY+RAD*Math.sin(rad(c.angle));
    const P=pal[c.p];
    const act=active===c.id;
    l+=`<line x1="${CX}" y1="${CY}" x2="${x}" y2="${y}" stroke="${P.s}" stroke-width="${act?1.5:0.5}" opacity="${act?0.7:0.3}"/>`;
    n+=`<g class="cat-nd" onclick="selCat('${c.id}')">
      <rect x="${x-NW/2}" y="${y-NH/2}" width="${NW}" height="${NH}" rx="${NH/2}" fill="${P.f}" stroke="${P.s}" stroke-width="${act?2.5:1.5}"/>
      <text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="${P.t}" font-size="12" font-weight="500" font-family="var(--font-sans)">${c.name}</text>
    </g>`;
  });

  const cf=dk?'#CECBF6':'#2C2C2A';
  const ct=dk?'#2C2C2A':'#ffffff';
  n+=`<g>
    <rect x="${CX-58}" y="${CY-18}" width="116" height="36" rx="18" fill="${cf}"/>
    <text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="central" fill="${ct}" font-size="14" font-weight="500" font-family="var(--font-sans)">JavaScript</text>
  </g>`;

  lG.innerHTML=l;
  nG.innerHTML=n;
}

function selCat(id){
  active=active===id?null:id;
  draw();
  renderDtl();
}

function renderDtl(){
  const el=document.getElementById('dtl');
  if(!active){
    el.innerHTML='<p style="text-align:center;font-size:13px;color:var(--color-text-tertiary);margin:22px 0">Click any category node to explore its concepts in depth</p>';
    return;
  }
  const cat=cats.find(c=>c.id===active);
  const P=pal[cat.p];
  const total=cat.groups.reduce((a,g)=>a+g.cs.length,0);

  let h=`<div style="padding:16px 0 10px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
    <span style="font-size:16px;font-weight:500;color:var(--color-text-primary)">${cat.name}</span>
    <span style="font-size:13px;color:var(--color-text-tertiary)">${cat.groups.length} groups · ${total} concepts</span>
  </div>
  <div class="concept-grid">`;

  cat.groups.forEach(g=>{
    h+=`<div class="ccard" style="background:${P.f};border:0.5px solid ${P.s}44">
      <h4 style="color:${P.t}">${g.n}</h4>
      <div>`;
    g.cs.forEach(c=>{
      h+=`<div class="ci" style="color:${P.t};border-bottom-color:${P.s}22">${c}</div>`;
    });
    h+=`</div></div>`;
  });

  h+=`</div><div style="height:8px"></div>`;
  el.innerHTML=h;
}

draw();
</script>
